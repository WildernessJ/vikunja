# Fork-only image build. Not present upstream, so it never conflicts on sync.
# Builds the combined frontend+API image from the repo's Dockerfile and pushes
# it to this fork's GHCR. Keep upstream's ci.yml/release.yml DISABLED on the fork.
name: fork-image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fork-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so git describe can compute a version

      - name: Compute version
        id: ver
        run: echo "value=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64 # Unraid is x86_64; single-arch keeps builds fast
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELEASE_VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
